<li class="movieDetail__item">
    <p class="movieDetail__title">{{title}}</p>
    <img class="movieDetail__img" src="{{image}}" alt="poster">
    <p class="movieDetail__description">{{description}}</p>
    <p class="movieDetail__realisateur">{{realisateur}}</p>
    <p class="movieDetail__annee">{{annee}}</p>
    <p class="movieDetail__category">{{category}}</p>
    <p class="movieDetail__age">{{age}}</p>
    <iframe src="{{trailer}}" frameborder="0"></iframe>
</li>
